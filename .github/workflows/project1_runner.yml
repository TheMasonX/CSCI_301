# This workflow compiles and runs the C++ programs for Project1
name: Project1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-project1:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Task1
      run: |
        cd Project1
        script -c "g++ project1_task1.cpp fraction.cpp && ./a.out" typescript_task1
        cat typescript_task1

    - name: Run Task2
      run: |
        cd Project1
        script -c "g++ project1_task2.cpp newfraction1.cpp && echo -e '3 5\n2 3' | ./a.out" typescript_task2
        cat typescript_task2

    - name: Run Task3
      run: |
        cd Project1
        script -c "g++ project1_task3.cpp newfraction2.cpp && echo -e '3 5\n2 3' | ./a.out" typescript_task3
        cat typescript_task3

    - name: Upload script files
      uses: actions/upload-artifact@v4
      with:
        name: typescript-files
        path: |
          Project1/typescript_task1
          Project1/typescript_task2
          Project1/typescript_task3